<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.badge { display:inline-flex; align-items:center; gap:6px; font-family:Inter; font-weight:600; font-size:11px; line-height:1; padding:5px 10px; border-radius:999px; letter-spacing:0.04em; }
.badge .dot { width:6px; height:6px; border-radius:999px; background:currentColor; }
</style></head><body><div class="card" style="padding:28px">
<div class="tag">BADGES — STATUS PILLS</div>
<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
  <span class="badge" style="background:#E6EFFB;color:#023889"><span class="dot"></span>In stock</span>
  <span class="badge" style="background:#E5F7FF;color:#0079AB"><span class="dot"></span>New</span>
  <span class="badge" style="background:#DCF5E8;color:#0E7A4F"><span class="dot"></span>Installed</span>
  <span class="badge" style="background:#FFF1D6;color:#9A6209"><span class="dot"></span>On order</span>
  <span class="badge" style="background:#FCE3E4;color:#A11A1F"><span class="dot"></span>Backorder</span>
  <span class="badge" style="background:#0F1032;color:#fff"><span class="dot" style="background:#00B3FD"></span>Pro tier</span>
</div>
<div class="tag" style="margin-top:22px">TAGS — CATEGORY</div>
<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
  <span style="display:inline-flex;align-items:center;font-family:Inter;font-weight:500;font-size:12px;padding:4px 10px;border-radius:4px;background:#EDF1F6;color:#3E4756">Navigation</span>
  <span style="display:inline-flex;align-items:center;font-family:Inter;font-weight:500;font-size:12px;padding:4px 10px;border-radius:4px;background:#EDF1F6;color:#3E4756">Lighting</span>
  <span style="display:inline-flex;align-items:center;font-family:Inter;font-weight:500;font-size:12px;padding:4px 10px;border-radius:4px;background:#EDF1F6;color:#3E4756">Audio</span>
  <span style="display:inline-flex;align-items:center;font-family:Inter;font-weight:500;font-size:12px;padding:4px 10px;border-radius:4px;background:#EDF1F6;color:#3E4756">Power</span>
  <span style="display:inline-flex;align-items:center;font-family:Inter;font-weight:500;font-size:12px;padding:4px 10px;border-radius:4px;background:#045AD6;color:#fff">Featured</span>
</div>
</div></body></html>
