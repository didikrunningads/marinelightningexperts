<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="tag">SEMANTIC — STATUS</div>
<div class="row" style="margin-top:10px">
  <div class="swatch"><div class="chip" style="background:#16A36A"></div><div class="name">Success</div><div class="meta">#16A36A</div></div>
  <div class="swatch"><div class="chip" style="background:#F5A524"></div><div class="name">Warning</div><div class="meta">#F5A524</div></div>
  <div class="swatch"><div class="chip" style="background:#E5484D"></div><div class="name">Danger</div><div class="meta">#E5484D</div></div>
  <div class="swatch"><div class="chip" style="background:#00B3FD"></div><div class="name">Info</div><div class="meta">#00B3FD</div></div>
</div>
<div class="tag" style="margin-top:18px">BRAND GRADIENTS</div>
<div class="row" style="margin-top:10px">
  <div class="swatch"><div class="chip" style="background:linear-gradient(135deg,#00B3FD 0%,#045AD6 100%);height:80px"></div><div class="name">Brand</div><div class="meta">electric → cobalt 135°</div></div>
  <div class="swatch"><div class="chip" style="background:linear-gradient(180deg,#0F1032 0%,#050513 100%);height:80px"></div><div class="name">Night</div><div class="meta">midnight → black 180°</div></div>
  <div class="swatch"><div class="chip" style="background:linear-gradient(180deg,#E5F7FF 0%,#FFFFFF 100%);height:80px;border:1px solid #DBE2EC"></div><div class="name">Sky</div><div class="meta">tint → paper 180°</div></div>
</div>
</div></body></html>
