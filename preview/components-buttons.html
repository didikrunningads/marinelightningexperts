<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.btn { display:inline-flex; align-items:center; gap:8px; font-family:Inter; font-weight:600; font-size:14px; line-height:1; padding:12px 18px; border-radius:8px; border:1px solid transparent; cursor:pointer; transition:all 200ms cubic-bezier(0.22,1,0.36,1); }
.btn-primary { background:#045AD6; color:#fff; }
.btn-primary:hover { background:#0349B0; box-shadow:0 0 0 4px rgba(0,179,253,0.20),0 8px 24px -4px rgba(4,90,214,0.40); }
.btn-secondary { background:#fff; color:#0F1032; border-color:#DBE2EC; }
.btn-secondary:hover { border-color:#045AD6; color:#045AD6; }
.btn-ghost { background:transparent; color:#045AD6; }
.btn-ghost:hover { background:#E6EFFB; }
.btn-dark { background:#0F1032; color:#fff; }
.btn-disabled { background:#EDF1F6; color:#8A95A6; cursor:not-allowed; }
.btn-sm { font-size:12px; padding:8px 12px; }
.btn-lg { font-size:16px; padding:14px 22px; }
</style></head><body><div class="card" style="padding:28px">
<div class="tag">BUTTONS — VARIANTS</div>
<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center">
  <button class="btn btn-primary">Request a quote</button>
  <button class="btn btn-secondary">Browse catalog</button>
  <button class="btn btn-ghost">Learn more</button>
  <button class="btn btn-dark">Talk to installer</button>
  <button class="btn btn-disabled" disabled>Disabled</button>
</div>
<div class="tag" style="margin-top:22px">SIZES</div>
<div style="display:flex;gap:10px;margin-top:14px;align-items:center">
  <button class="btn btn-primary btn-sm">Small</button>
  <button class="btn btn-primary">Default</button>
  <button class="btn btn-primary btn-lg">Large</button>
</div>
</div></body></html>
