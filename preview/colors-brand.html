<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 32px 28px; }
.brand-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.brand-cell { border-radius: 10px; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px; }
.brand-cell .label { font-family: var(--st-font-body); font-weight: 600; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
.brand-cell .hex { font-family: var(--st-font-mono); font-size: 13px; }
.brand-cell .role { font-family: var(--st-font-body); font-size: 12px; opacity: 0.9; margin-top: 6px; }
</style></head><body><div class="card">
<div class="brand-row">
  <div class="brand-cell" style="background:#045AD6;color:#fff">
    <div><div class="label">COBALT — PRIMARY</div><div class="role">CTAs · links · brand chrome</div></div>
    <div class="hex">#045AD6</div>
  </div>
  <div class="brand-cell" style="background:#00B3FD;color:#0F1032">
    <div><div class="label">ELECTRIC — ACCENT</div><div class="role">Highlights · iris · gradient stop</div></div>
    <div class="hex">#00B3FD</div>
  </div>
  <div class="brand-cell" style="background:#0F1032;color:#fff">
    <div><div class="label">MIDNIGHT — ANCHOR</div><div class="role">Headlines · dark surfaces · body text</div></div>
    <div class="hex">#0F1032</div>
  </div>
  <div class="brand-cell" style="background:#FFFFFF;color:#0F1032;border:1px solid #DBE2EC">
    <div><div class="label">PAPER</div><div class="role">Default surface · negative space</div></div>
    <div class="hex">#FFFFFF</div>
  </div>
</div>
</div></body></html>
