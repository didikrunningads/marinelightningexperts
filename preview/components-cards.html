<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card" style="padding:28px;background:#F6F8FB">
<div class="tag">PRODUCT CARD</div>
<div style="display:flex;gap:14px;margin-top:14px">
  <div style="background:#fff;border:1px solid #DBE2EC;border-radius:12px;box-shadow:0 1px 3px 0 rgba(15,16,50,0.08),0 1px 2px 0 rgba(15,16,50,0.04);padding:18px;width:300px">
    <div style="aspect-ratio:4/3;background:linear-gradient(135deg,#E5F7FF 0%,#BFD4F4 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#5C6678;font-family:Inter;font-size:11px">Product image</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:14px">
      <span style="font-family:Inter;font-weight:600;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#045AD6">NAVIGATION</span>
    </div>
    <div style="font-family:Barlow;font-weight:600;font-size:18px;color:#0F1032;margin-top:6px;line-height:1.2">12-inch Multi-Function Display</div>
    <div style="font-family:'SF Mono',Menlo,monospace;font-size:11px;color:#5C6678;margin-top:4px">SHX-MFD-1200</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px">
      <div style="font-family:Barlow;font-weight:700;font-size:24px;color:#0F1032">$2,480</div>
      <span style="display:inline-flex;align-items:center;gap:4px;font-family:Inter;font-weight:600;font-size:11px;padding:4px 8px;border-radius:999px;background:#DCF5E8;color:#0E7A4F"><span style="width:5px;height:5px;border-radius:999px;background:currentColor"></span>In stock</span>
    </div>
  </div>
  <div style="background:#fff;border:1px solid #DBE2EC;border-radius:12px;box-shadow:0 1px 3px 0 rgba(15,16,50,0.08),0 1px 2px 0 rgba(15,16,50,0.04);padding:18px;width:300px;border-color:#045AD6">
    <div style="aspect-ratio:4/3;background:#0F1032;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#80D8FF;font-family:Inter;font-size:11px">Product image · selected</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:14px">
      <span style="font-family:Inter;font-weight:600;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#045AD6">AUDIO</span>
    </div>
    <div style="font-family:Barlow;font-weight:600;font-size:18px;color:#0F1032;margin-top:6px;line-height:1.2">8-Channel Marine Amplifier</div>
    <div style="font-family:'SF Mono',Menlo,monospace;font-size:11px;color:#5C6678;margin-top:4px">SHX-AMP-808M</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px">
      <div style="font-family:Barlow;font-weight:700;font-size:24px;color:#0F1032">$1,180</div>
      <span style="display:inline-flex;align-items:center;gap:4px;font-family:Inter;font-weight:600;font-size:11px;padding:4px 8px;border-radius:999px;background:#E6EFFB;color:#023889"><span style="width:5px;height:5px;border-radius:999px;background:currentColor"></span>2 left</span>
    </div>
  </div>
</div>
</div></body></html>
